name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - checkpointstore/sqlite
          - eventstore/sqlite
          - examples/persistent
          - snapshotstore/sqlite
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: '**/go.sum'
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: Test (race)
        working-directory: ${{ matrix.module }}
        run: go test -race ./...
      - name: Modernize
        working-directory: ${{ matrix.module }}
        run: |
          out=$(go run golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest ./... 2>&1)
          if [ -n "$out" ]; then
            echo "$out"
            exit 1
          fi
